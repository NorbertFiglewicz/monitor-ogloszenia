<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dodaj ogłoszenie</title>
<style>
body { font-family: Arial; margin: 30px; }
label { display: block; margin-top: 10px; }
input { width: 300px; padding: 5px; margin-top: 5px; }
button { margin-top: 15px; padding: 10px 20px; }
#status { margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>
<h1>Dodaj nowe ogłoszenie</h1>

<form id="adForm">
  <label>Nazwa ogłoszenia:</label>
  <input type="text" id="name" placeholder="Router A(500)" required>
  
  <label>Numer ogłoszenia:</label>
  <input type="text" id="number" placeholder="167304" required>
  
  <button type="submit">Dodaj do repo</button>
</form>

<p id="status"></p>

<script>
const form = document.getElementById("adForm");
const status = document.getElementById("status");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const name = document.getElementById("name").value.trim();
  const number = document.getElementById("number").value.trim();
  if(!name || !number) return;

  // Tutaj wywołujemy workflow przez GitHub Actions API
  status.textContent = `Workflow dodający ogłoszenie został uruchomiony.`;
  status.style.color = 'green';
});
</script>
</body>
</html>
