name: Monitor ogłoszeń

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Odtwórz ads.secret.txt z base64
        run: |
          echo "${{ secrets.ADS_SECRET }}" | base64 --decode > ads.secret.txt

      - name: Sprawdź ogłoszenia
        run: python check_ads.py

      - name: Generuj wykresy
        run: python generate_chart.py

      - name: Generuj stronę
        run: python generate_page.py

      - name: Commit i push
        run: |
          git config --global user.name "monitor-bot"
          git config --global user.email "monitor@github.com"
          git add *.csv *.png index.html
          git commit -m "Aktualizacja monitoringu" || exit 0
          git push
