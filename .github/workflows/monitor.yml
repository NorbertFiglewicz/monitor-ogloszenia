name: Monitor ogłoszeń

on:
  schedule:
    - cron: "*/5 * * * *"  # co 5 minut
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Ustawienie secretów
        run: |
          echo "BASE_ANONS=${{ secrets.BASE_ANONS }}" >> $GITHUB_ENV
          echo "BASE_MAIN=${{ secrets.BASE_MAIN }}" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install requests pandas matplotlib

      - name: Check ads
        run: python check_ads.py

      - name: Generate charts
        run: python generate_chart.py

      - name: Generate index.html
        run: python generate_page.py

      - name: Commit i push
        run: |
          git config --global user.name "monitor-bot"
          git config --global user.email "monitor@github.com"
          git add *.csv *.png index.html
          git commit -m "Automatyczna aktualizacja monitoringu" || echo "Brak zmian do commitowania"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
