name: Monitor ogłoszeń

on:
  schedule:
    - cron: "*/5 * * * *"   # co 5 minut
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Instalacja bibliotek
      - name: Install dependencies
        run: |
          pip install requests pandas matplotlib

      # 4️⃣ Odtworzenie pliku z Secret (base64)
      - name: Odtwórz ads.secret.txt
        run: |
          echo "${{ secrets.ADS_SECRET }}" | base64 --decode > ads.secret.txt

      # 5️⃣ Sprawdzenie czy plik się utworzył
      - name: Debug ads.secret.txt
        run: |
          echo "Zawartość ads.secret.txt:"
          cat ads.secret.txt || echo "Plik nie istnieje"

      # 6️⃣ Sprawdzenie ogłoszeń
      - name: Sprawdź ogłoszenia
        run: python check_ads.py

      # 7️⃣ Generowanie wykresów
      - name: Generuj wykresy
        run: python generate_chart.py

      # 8️⃣ Generowanie strony
      - name: Generuj stronę
        run: python generate_page.py

      # 9️⃣ Commit tylko jeśli są zmiany
      - name: Commit i push
        run: |
          git config --global user.name "monitor-bot"
          git config --global user.email "monitor@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "Brak zmian do commitowania"
          else
            git commit -m "Automatyczna aktualizacja monitoringu"
            git push
          fi
