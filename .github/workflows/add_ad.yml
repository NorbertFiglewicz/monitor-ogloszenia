name: Add new ad

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nazwa ogłoszenia'
        required: true
      number:
        description: 'Numer ogłoszenia'
        required: true

jobs:
  add_ad:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Dodaj ogłoszenie do JSON
        run: |
          # jeśli plik nie istnieje, tworzymy pusty JSON
          if [ ! -f ads.json ]; then
            echo "[]" > ads.json
          fi
          
          # dodajemy nowe ogłoszenie do JSON
          jq --arg name "${{ github.event.inputs.name }}" \
             --arg number "${{ github.event.inputs.number }}" \
             '. += [{"name": $name, "number": $number}]' ads.json > tmp.json
          mv tmp.json ads.json

      - name: Commit i push
        run: |
          git config --global user.name "monitor-bot"
          git config --global user.email "monitor@github.com"
          git add ads.json
          git commit -m "Dodano ogłoszenie: ${{ github.event.inputs.name }}" || exit 0
          git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
